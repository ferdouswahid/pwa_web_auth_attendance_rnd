<div class="min-h-screen bg-gray-50 pb-20 flex flex-col">

  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-10 flex-shrink-0">
    <div class="max-w-lg mx-auto px-4 py-4 flex items-center justify-between">
      <div>
        @if (subtitle()) {
          <p class="text-xs text-gray-500 uppercase tracking-wide">{{ subtitle() }}</p>
        }
        <h1 class="text-lg font-bold text-gray-900">{{ title() }}</h1>
      </div>
      <div class="flex items-center gap-2">
        <button (click)="goToProfile()"
          class="w-9 h-9 flex items-center justify-center rounded-xl text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </button>
        <button (click)="logout()"
          class="w-9 h-9 flex items-center justify-center rounded-xl text-gray-500 hover:text-red-500 hover:bg-red-50 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Page content -->
  <ng-content></ng-content>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 inset-x-0 bg-white border-t border-gray-100 z-20">
    <div class="max-w-lg mx-auto flex">
      <a routerLink="/dashboard" routerLinkActive="text-indigo-600" [routerLinkActiveOptions]="{exact:true}"
        class="flex-1 flex flex-col items-center justify-center py-3 gap-0.5 text-gray-400 hover:text-indigo-500 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span class="text-xs font-medium">Dashboard</span>
      </a>
      <a routerLink="/punch" routerLinkActive="text-indigo-600"
        class="flex-1 flex flex-col items-center justify-center py-3 gap-0.5 text-gray-400 hover:text-indigo-500 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="text-xs font-medium">Attendance</span>
      </a>
      <a routerLink="/zones" routerLinkActive="text-indigo-600"
        class="flex-1 flex flex-col items-center justify-center py-3 gap-0.5 text-gray-400 hover:text-indigo-500 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <span class="text-xs font-medium">Zones</span>
      </a>
      <a routerLink="/employees" routerLinkActive="text-indigo-600"
        class="flex-1 flex flex-col items-center justify-center py-3 gap-0.5 text-gray-400 hover:text-indigo-500 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <span class="text-xs font-medium">Employees</span>
      </a>
    </div>
  </nav>

</div>
